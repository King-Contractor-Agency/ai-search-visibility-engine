name: AI Visibility Scan

on:
  workflow_dispatch:
    inputs:
      clients:
        description: Optional comma-separated client_slug filter
        required: false
        type: string
      prompt_limit:
        description: Max prompts per client (0 = all, default 12)
        required: false
        default: "12"
        type: string
      no_publish:
        description: Skip pushing briefs to client deliverables repos
        required: false
        default: "false"
        type: string
      dry_run:
        description: Skip persistence, briefs, and publishing
        required: false
        default: "false"
        type: string
  schedule:
    # First of every month at 10:00 UTC (≈ 6 AM ET)
    - cron: "0 10 1 * *"

permissions:
  contents: write

concurrency:
  group: ai-visibility-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare runtime folders
        run: mkdir -p output/reports output/briefs data/prompt_history docs

      - name: Run scan
        env:
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          DELIVERABLES_PAT:   ${{ secrets.DELIVERABLES_PAT }}
          PUBLISHER_NAME:     ${{ vars.PUBLISHER_NAME }}
          PUBLISHER_EMAIL:    ${{ vars.PUBLISHER_EMAIL }}
          BRIEF_MODEL:        ${{ vars.BRIEF_MODEL }}
          OPENAI_MODEL:       ${{ vars.OPENAI_MODEL }}
          GEMINI_MODEL:       ${{ vars.GEMINI_MODEL }}
          INPUT_CLIENTS:      ${{ github.event.inputs.clients }}
          INPUT_PROMPT_LIMIT: ${{ github.event.inputs.prompt_limit }}
          INPUT_DRY_RUN:      ${{ github.event.inputs.dry_run }}
          INPUT_NO_PUBLISH:   ${{ github.event.inputs.no_publish }}
        shell: bash
        run: |
          set -euo pipefail
          cmd=(python3 scripts/run_scan.py)
          if [[ -n "${INPUT_CLIENTS:-}" ]]; then
            cmd+=(--clients "$INPUT_CLIENTS")
          fi
          if [[ -n "${INPUT_PROMPT_LIMIT:-}" && "${INPUT_PROMPT_LIMIT}" != "0" ]]; then
            cmd+=(--prompt-limit "$INPUT_PROMPT_LIMIT")
          fi
          if [[ "${INPUT_NO_PUBLISH:-false}" == "true" ]]; then
            cmd+=(--no-publish)
          fi
          if [[ "${INPUT_DRY_RUN:-false}" == "true" ]]; then
            cmd+=(--dry-run --no-briefs --no-publish)
          fi
          "${cmd[@]}"

      - name: Commit updated state and dashboard
        if: ${{ github.event.inputs.dry_run != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/seen_prompts.json data/active_tiers.json
          git add data/prompt_history/ output/citations.csv docs/data.json docs/latest_summary.md 2>/dev/null || true
          git add output/reports/ output/briefs/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi

          git commit -m "AI Visibility scan: $(date -u +%Y-%m-%d)"
          git push

      - name: Job summary
        if: always()
        shell: bash
        run: |
          if [[ -f docs/latest_summary.md ]]; then
            cat docs/latest_summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No summary generated." >> "$GITHUB_STEP_SUMMARY"
          fi
